name: KRBA

on:
  schedule:
    - cron: "3-59/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: pinger
        run: |
          curl --fail --silent --show-error --max-time 20 \
            "https://roomly-bcjb.onrender.com/roomly/api/v1/health"
